<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Page</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-light">
    <!-- Header -->
    <header class="bg-dark text-white py-4">
      <div class="container">
        <h1 class="mb-1">My Online Store</h1>
        <p class="mb-0 text-white-50">
          Bootstrap shopping grid demo
        </p>
      </div>
    </header>

    <!-- Products -->
    <main class="container py-5">
      <h2 class="mb-4">Products</h2>

      <div class="row g-4">
        <!-- 1 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/wirelessheadphones.jpg"
                class="card-img-top img-fluid product-img"
                alt="Wireless Headphones"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Wireless Headphones</h5>
              <p class="text-muted">$59.99</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>

        <!-- 2 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/smartwatch.jpg"
                class="card-img-top img-fluid product-img"
                alt="Smart Watch"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Smart Watch</h5>
              <p class="text-muted">$89.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>

        <!-- 3 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/bluetoothspeaker.jpg"
                class="card-img-top img-fluid product-img"
                alt="Bluetooth Speaker"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Bluetooth Speaker</h5>
              <p class="text-muted">$39.50</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>

        <!-- 4 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/laptopbackpack.jpg"
                class="card-img-top img-fluid product-img"
                alt="Laptop Backpack"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Laptop Backpack</h5>
              <p class="text-muted">$44.99</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>

        <!-- 5 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/coffeegrinder.jpg"
                class="card-img-top img-fluid product-img"
                alt="Coffee Grinder"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Coffee Grinder</h5>
              <p class="text-muted">$29.99</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>

        <!-- 6 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/desklamp.jpg"
                class="card-img-top img-fluid product-img"
                alt="Desk Lamp"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Desk Lamp</h5>
              <p class="text-muted">$19.95</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>

        <!-- 7 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/fitnessmat.jpg"
                class="card-img-top img-fluid product-img"
                alt="Fitness Mat"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Fitness Mat</h5>
              <p class="text-muted">$24.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>

        <!-- 8 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/waterbottle.jpg"
                class="card-img-top img-fluid product-img"
                alt="Water Bottle"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Water Bottle</h5>
              <p class="text-muted">$12.99</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>

        <!-- 9 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/phonestand.jpg"
                class="card-img-top img-fluid product-img"
                alt="Phone Stand"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Phone Stand</h5>
              <p class="text-muted">$9.49</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>

        <!-- 10 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="product-img-wrap">
              <img
                src="images/portablecharger.jpg"
                class="card-img-top img-fluid product-img"
                alt="Portable Charger"
              />
            </div>
            <div class="card-body">
              <h5 class="card-title">Portable Charger</h5>
              <p class="text-muted">$34.90</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-top py-4">
      <div class="container">
        <div class="row align-items-center g-3">
          <div class="col-12 col-md-auto">
          <img
  src="https://via.placeholder.com/80x50?text=Logo"
  alt="Company Logo"
  class="footer-logo img-fluid"
/>

          </div>

          <div class="col">
            <form class="row g-2">
              <div class="col-12 col-md-4">
                <input
                  type="text"
                  class="form-control"
                  placeholder="Full name"
                />
              </div>
              <div class="col-12 col-md-4">
                <input
                  type="email"
                  class="form-control"
                  placeholder="Email"
                />
              </div>
              <div class="col-12 col-md-4">
                <input
                  type="tel"
                  class="form-control"
                  placeholder="Phone"
                />
              </div>
              <div class="col-12">
                <button class="btn btn-outline-primary">
                  Send
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
